services:
  postgres_english_bot:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: english_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d english_bot"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-dir",
        "/migrations",
        "postgres",
        "postgres://postgres:postgres@postgres_english_bot:5432/english_bot?sslmode=disable",
        "up"
      ]
    depends_on:
      postgres_english_bot:
        condition: service_healthy

  english_bot:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres_english_bot:5432/english_bot?sslmode=disable
    depends_on:
      postgres_english_bot:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    restart: unless-stopped

volumes:
  postgres_data: